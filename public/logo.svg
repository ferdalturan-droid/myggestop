<svg width="520" height="150" viewBox="0 0 520 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Myggestop logo">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3aa9f0"/><stop offset="1" stop-color="#0f5fa6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ed957"/><stop offset="1" stop-color="#3f9c12"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1b8de0"/><stop offset="1" stop-color="#5cc524"/>
    </linearGradient>
  </defs>
  <!-- net dome -->
  <path d="M22 78 A66 66 0 0 1 154 78" fill="none" stroke="url(#blue)" stroke-width="3" opacity="0.9"/>
  <g stroke="url(#blue)" stroke-width="1.4" opacity="0.55">
    <line x1="40" y1="40" x2="40" y2="78"/><line x1="58" y1="28" x2="58" y2="78"/>
    <line x1="76" y1="22" x2="76" y2="78"/><line x1="94" y1="22" x2="94" y2="78"/>
    <line x1="112" y1="28" x2="112" y2="78"/><line x1="130" y1="40" x2="130" y2="78"/>
    <path d="M30 56 H146" fill="none"/><path d="M26 68 H150" fill="none"/><path d="M36 44 H134" fill="none"/>
  </g>
  <!-- house -->
  <path d="M58 86 L92 56 L126 86 Z" fill="url(#blue)"/>
  <rect x="66" y="84" width="52" height="30" fill="url(#blue)"/>
  <rect x="80" y="92" width="16" height="16" fill="#fff" opacity="0.9"/>
  <line x1="88" y1="92" x2="88" y2="108" stroke="#0f5fa6" stroke-width="1.6"/>
  <line x1="80" y1="100" x2="96" y2="100" stroke="#0f5fa6" stroke-width="1.6"/>
  <!-- green arrow / leaf -->
  <path d="M128 114 L150 60 L160 78 L138 114 Z" fill="url(#green)"/>
  <!-- mosquito molecules -->
  <circle cx="172" cy="44" r="13" fill="url(#green)"/>
  <circle cx="178" cy="74" r="10" fill="url(#green)"/>
  <g fill="#7ed957"><circle cx="196" cy="40" r="3.2"/><circle cx="200" cy="56" r="2.6"/><circle cx="190" cy="64" r="2.2"/><circle cx="188" cy="28" r="2.4"/><circle cx="160" cy="30" r="2.4"/></g>
  <!-- waves -->
  <path d="M20 120 C60 108 100 132 140 120 C170 111 195 124 205 120" fill="none" stroke="url(#wave)" stroke-width="6" stroke-linecap="round"/>
  <path d="M24 132 C64 122 104 142 144 132 C172 124 196 134 206 131" fill="none" stroke="url(#green)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <!-- wordmark -->
  <text x="232" y="98" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" letter-spacing="-1">
    <tspan fill="url(#blue)">MYGGE</tspan><tspan fill="url(#green)">STOP</tspan>
  </text>
</svg>
